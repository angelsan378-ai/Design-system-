
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветовая схема</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            max-width: 640px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #1c1c1e;
        }
        .group {
            margin-bottom: 2rem;
        }
        .group-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #8e8e93;
            margin-bottom: 0.75rem;
        }
        .swatch {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 6px 12px 6px 6px;
            border-radius: 12px;
            margin-bottom: 4px;
        }
        .color-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
            background: #e0e0e0;
        }
        .color-name {
            font-weight: 500;
            color: #1c1c1e;
            flex: 1;
        }
        .color-picker-input {
            width: 36px;
            height: 36px;
            border: none;
            padding: 0;
            cursor: pointer;
            background: transparent;
            border-radius: 8px;
        }
        .color-picker-input::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .color-picker-input::-webkit-color-swatch {
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .color-hex {
            font-family: monospace;
            font-size: 0.85rem;
            color: #8e8e93;
            min-width: 70px;
            text-align: right;
        }
        hr {
            border: none;
            border-top: 1px solid #e9e9ed;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Primary Colors</h1>
    
    <!-- Primary Group -->
    <div class="group">
        <div class="group-label">Primary</div>
        <div class="swatch">
            <div class="color-box" id="primary-box" style="background: #1A73E8;"></div>
            <span class="color-name">Primary</span>
            <input type="color" id="primary-picker" class="color-picker-input" value="#1A73E8">
            <span class="color-hex" id="primary-hex">#1A73E8</span>
        </div>
        <div class="swatch">
            <div class="color-box" id="primary-dark-box" style="background: #1557B0;"></div>
            <span class="color-name">Primary/Dark</span>
            <input type="color" id="primary-dark-picker" class="color-picker-input" value="#1557B0">
            <span class="color-hex" id="primary-dark-hex">#1557B0</span>
        </div>
        <div class="swatch">
            <div class="color-box" id="primary-light-box" style="background: #E8F0FE;"></div>
            <span class="color-name">Primary/Light</span>
            <input type="color" id="primary-light-picker" class="color-picker-input" value="#E8F0FE">
            <span class="color-hex" id="primary-light-hex">#E8F0FE</span>
        </div>
    </div>
    
    <hr>
    
    <!-- Secondary Group -->
    <div class="group">
        <div class="group-label">Secondary</div>
        <div class="swatch">
            <div class="color-box" id="secondary-box" style="background: #34A853;"></div>
            <span class="color-name">Secondary</span>
            <input type="color" id="secondary-picker" class="color-picker-input" value="#34A853">
            <span class="color-hex" id="secondary-hex">#34A853</span>
        </div>
        <div class="swatch">
            <div class="color-box" id="secondary-dark-box" style="background: #1E7E34;"></div>
            <span class="color-name">Secondary/Dark</span>
            <input type="color" id="secondary-dark-picker" class="color-picker-input" value="#1E7E34">
            <span class="color-hex" id="secondary-dark-hex">#1E7E34</span>
        </div>
        <div class="swatch">
            <div class="color-box" id="secondary-light-box" style="background: #E6F4EA;"></div>
            <span class="color-name">Secondary/Light</span>
            <input type="color" id="secondary-light-picker" class="color-picker-input" value="#E6F4EA">
            <span class="color-hex" id="secondary-light-hex">#E6F4EA</span>
        </div>
    </div>
    
    <hr>
    
    <!-- System Group -->
    <div class="group">
        <div class="group-label">System</div>
        <div class="swatch">
            <div class="color-box" id="error-box" style="background: #EA4335;"></div>
            <span class="color-name">Error</span>
            <input type="color" id="error-picker" class="color-picker-input" value="#EA4335">
            <span class="color-hex" id="error-hex">#EA4335</span>
        </div>
        <div class="swatch">
            <div class="color-box" id="warning-box" style="background: #FBBC04;"></div>
            <span class="color-name">Warning</span>
            <input type="color" id="warning-picker" class="color-picker-input" value="#FBBC04">
            <span class="color-hex" id="warning-hex">#FBBC04</span>
        </div>
        <div class="swatch">
            <div class="color-box" id="success-box" style="background: #34A853;"></div>
            <span class="color-name">Success</span>
            <input type="color" id="success-picker" class="color-picker-input" value="#34A853">
            <span class="color-hex" id="success-hex">#34A853</span>
        </div>
    </div>
</div>

<script>
    // Находим все инпуты выбора цвета
    const pickers = document.querySelectorAll('.color-picker-input');

    pickers.forEach(picker => {
        picker.addEventListener('input', (e) => {
            // Получаем чистый ID (например, "primary" из "primary-picker")
            const baseId = e.target.id.replace('-picker', '');
            const color = e.target.value;
            
            // Обновляем цвет плитки и текстовое значение HEX
            document.getElementById(`${baseId}-box`).style.background = color;
            document.getElementById(`${baseId}-hex`).textContent = color.toUpperCase();
        });
    });
</script>

</body>
</html>
