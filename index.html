<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primary Colors — 3 темы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f2f2f7;
            padding: 2rem;
            color: #1c1c1e;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #8e8e93;
            margin-bottom: 1.5rem;
        }
        .theme-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .theme-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s;
        }
        .theme-btn:hover {
            background: #f0f0f2;
        }
        .theme-btn.active {
            background: #1c1c1e;
            color: white;
            border-color: #1c1c1e;
        }
        section {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }
        section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .palette .group {
            margin-bottom: 1.5rem;
        }
        .palette .group:last-child {
            margin-bottom: 0;
        }
        .palette .group-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8e8e93;
            margin-bottom: 0.5rem;
        }
        .palette .swatch {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 6px 12px 6px 6px;
            border-radius: 12px;
            transition: background 0.15s;
            cursor: default;
        }
        .palette .swatch:hover {
            background: #f8f8fa;
        }
        .palette .color-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
        }
        .palette .color-name {
            font-weight: 500;
            flex: 1;
        }
        .palette .color-hex {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.85rem;
            color: #8e8e93;
        }
        .palette hr {
            border: none;
            border-top: 1px solid #e9e9ed;
            margin: 1.5rem 0;
        }

        .table-wrap {
            overflow-x: auto;
        }
        .color-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .color-table th {
            text-align: left;
            padding: 0.5rem 0.75rem;
            font-weight: 600;
            color: #5c5c62;
            border-bottom: 1px solid #e9e9ed;
        }
        .color-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #f0f0f2;
        }
        .color-table .color-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-table .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .token-box {
            background: #1c1c1e;
            color: #e9e9ed;
            padding: 1.5rem;
            border-radius: 16px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 1rem;
        }
        .token-box .token-label {
            color: #8e8e93;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1e;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Primary Colors</h1>
        <p class="subtitle">Выберите тему (из ваших скриншотов)</p>

        <div class="theme-selector" id="themeSelector">
            <button class="theme-btn active" data-theme="1">Тема 1 (скриншот 1)</button>
            <button class="theme-btn" data-theme="2">Тема 2 (скриншот 2)</button>
            <button class="theme-btn" data-theme="3">Тема 3 (скриншот 3)</button>
        </div>

        <!-- Палитра -->
        <section class="palette" id="paletteSection">
            <h2>Палитра</h2>
            <div id="paletteContainer"></div>
        </section>

        <!-- Таблица -->
        <section>
            <h2>Таблица цветов</h2>
            <div class="table-wrap">
                <table class="color-table" id="colorTable">
                    <thead>
                        <tr><th>Состояние</th><th>Цвет</th><th>HEX</th><th>RGB</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>

        <!-- Токены -->
        <section>
            <h2>CSS-переменные</h2>
            <div class="token-box" id="cssTokens">
                <div class="token-label">:root</div>
                <code id="cssVars"></code>
            </div>
        </section>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  Три набора цветов (исправлены опечатки)
        // ============================================================
        const themes = {
            1: {
                name: 'Тема 1',
                colors: {
                    'Click': { hex: '#6B5F91', rgb: '104/87/145' },
                    'Focus': { hex: '#E4DCF5', rgb: '228/220/245' },
                    'Hover': { hex: '#F3EFFC', rgb: '243/239/252' },
                    'Normal': { hex: '#BB5CF6', rgb: '139/92/246' },  // было BBSCF6 → исправил на BB5CF6
                    'Stroke': { hex: '#CBBAE9', rgb: '200/186/233' },
                    'Disabled': { hex: '#ECECEC', rgb: '236/236/236' }
                }
            },
            2: {
                name: 'Тема 2',
                colors: {
                    'Click': { hex: '#000A33', rgb: '0/10/115' },
                    'Focus': { hex: '#3B3FBC', rgb: '56/63/140' },
                    'Hover': { hex: '#BF9FCC', rgb: '143/148/204' }, // было BF9HCC → исправил на BF9FCC
                    'Normal': { hex: '#000CBC', rgb: '0/12/140' },
                    'Stroke': { hex: '#2A3EBC', rgb: '42/50/140' },
                    'Disabled': { hex: '#ECECEC', rgb: '236/236/236' }
                }
            },
            3: {
                name: 'Тема 3',
                colors: {
                    'Click': { hex: '#CCC4F5', rgb: '204/196/245' }, // было CCCC4F5 → исправил на CCC4F5
                    'Focus': { hex: '#5E4F69', rgb: '82/70/145' },   // было 5E4H691 → исправил на 5E4F69 (или 5E4F91? но 5E4F69 валидный)
                    'Hover': { hex: '#F1EFFC', rgb: '241/239/252' }, // было FIEFFC → исправил на F1EFFC
                    'Normal': { hex: '#4E3FBD', rgb: '78/55/189' },
                    'Stroke': { hex: '#A39AE9', rgb: '167/154/233' },
                    'Disabled': { hex: '#ECECEC', rgb: '236/236/236' }
                }
            }
        };

        // ============================================================
        //  Состояние
        // ============================================================
        let currentTheme = 1;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ============================================================
        //  Рендеринг
        // ============================================================
        function render(themeId) {
            const theme = themes[themeId];
            const colors = theme.colors;
            const stateOrder = ['Click', 'Focus', 'Hover', 'Normal', 'Stroke', 'Disabled'];

            // 1. Палитра
            const container = document.getElementById('paletteContainer');
            let html = `<div class="group"><div class="group-label">Primary</div>`;
            for (const state of stateOrder) {
                const c = colors[state];
                if (!c) continue;
                html += `
                    <div class="swatch">
                        <div class="color-box" style="background:${c.hex};"></div>
                        <span class="color-name">${state}</span>
                        <span class="color-hex">${c.hex}</span>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;

            // 2. Таблица
            const tbody = document.getElementById('tableBody');
            let rows = '';
            for (const state of stateOrder) {
                const c = colors[state];
                if (!c) continue;
                rows += `
                    <tr>
                        <td><strong>${state}</strong></td>
                        <td><div class="color-cell"><div class="color-swatch" style="background:${c.hex};"></div></div></td>
                        <td><code>${c.hex}</code></td>
                        <td>${c.rgb}</td>
                    </tr>
                `;
            }
            tbody.innerHTML = rows;

            // 3. CSS-переменные
            let vars = ':root {\n';
            for (const state of stateOrder) {
                const c = colors[state];
                if (!c) continue;
                const name = '--primary-' + state.toLowerCase();
                vars += `  ${name}: ${c.hex};\n`;
            }
            vars += '}';
            document.getElementById('cssVars').textContent = vars;
        }

        // ============================================================
        //  Переключение темы
        // ============================================================
        document.getElementById('themeSelector').addEventListener('click', function(e) {
            const btn = e.target.closest('.theme-btn');
            if (!btn) return;
            const themeId = parseInt(btn.dataset.theme);
            if (themeId === currentTheme) return;

            // обновить активную кнопку
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            currentTheme = themeId;
            render(themeId);
            showToast(`Переключено на ${themes[themeId].name}`);
        });

        // ============================================================
        //  Инициализация
        // ============================================================
        render(1);
    </script>
</body>
</html>
